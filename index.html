<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DebtMap — Support</title>
  <style>
    :root { --brand: #16a34a; --brand-dark: #15803d; --ink: #1e293b; --muted: #64748b; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: linear-gradient(160deg, #ecfdf5 0%, #ffffff 60%); color: var(--ink); padding: 24px; }
    .card { max-width: 480px; width: 100%; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 24px; padding: 40px 32px; box-shadow: 0 12px 40px rgba(15,23,42,0.06); text-align: center; }
    .logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(22,163,74,0.28); }
    h1 { margin: 0 0 4px; font-size: 26px; color: var(--brand-dark); }
    .tag { color: var(--muted); margin: 0 0 28px; }
    .links { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    a.btn { display: block; padding: 14px 18px; border-radius: 14px; text-decoration: none;
            font-weight: 600; border: 1px solid #e2e8f0; color: var(--ink); background: #f8fafc; }
    a.btn:hover { border-color: var(--brand); color: var(--brand-dark); }
    .support { color: var(--muted); font-size: 15px; line-height: 1.6; }
    .support a { color: var(--brand); }
    footer { margin-top: 24px; color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="./logo.png" alt="DebtMap app icon" width="80" height="80" />
    <h1>DebtMap</h1>
    <p class="tag">See exactly when you'll be debt-free.</p>

    <div class="links">
      <a class="btn" href="./privacy/">Privacy Policy</a>
      <a class="btn" href="./terms/">Terms of Use</a>
    </div>

    <p class="support">
      Need help or have a question about DebtMap?<br />
      Email <a href="mailto:phophooe@gmail.com">phophooe@gmail.com</a> and we'll get back to you.
    </p>

    <footer>© 2026 Joseph Emmanuel Deladem Kudjordji</footer>
  </main>
</body>
</html>
